<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lan AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#ececec;height:100dvh;display:flex;flex-direction:column}
.header{background:#1a1a1a;padding:14px;text-align:center;font-weight:600;border-bottom:1px solid #333}
#stat{font-size:11px;opacity:0.6;margin-top:4px;color:#10a37f}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.5;white-space:pre-wrap}
.user{background:#8b5cf6;color:white;align-self:flex-end;border-bottom-right-radius:4px}
.ai{background:#1a1a1a;align-self:flex-start;border-bottom-left-radius:4px}
.box{padding:10px;background:#1a1a1a;border-top:1px solid #333}
.row{display:flex;gap:8px;align-items:flex-end}
#txt{flex:1;background:#262626;border:none;border-radius:20px;padding:12px 16px;color:#ececec;resize:none;max-height:200px;font-size:16px}
#btn{background:#8b5cf6;border:none;width:44px;height:44px;border-radius:50%;color:white;font-size:20px}
#btn:disabled{opacity:0.4}
pre{background:#0d0d0d;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;border:1px solid #333}
code{font-family:monospace;font-size:14px}
</style>
</head>
<body>
  <div class="header">
    lan AI
    <div id="stat">Gemini 1.5 Flash | Vercel Environment</div>
  </div>
  <div id="chat">
    <div class="msg ai">Halo kak! Aku lan AI. API Key aman di Vercel. Gas ngoding 4000 karakter 🔥</div>
  </div>
  <div class="box">
    <div class="row">
      <textarea id="txt" placeholder="Suruh apa aja kak..." rows="1"></textarea>
      <button id="btn">↑</button>
    </div>
  </div>

<script>
const chatDiv = document.getElementById('chat');
const txt = document.getElementById('txt');
const btn = document.getElementById('btn');
const stat = document.getElementById('stat');

let history = [
  {
    role: "user",
    parts: [{ text: "Kamu adalah lan AI, AI buatan kakak. Jawab santai, gaul, pake 'kak'. Kalo disuruh ngoding, kasih kode lengkap, panjang, dan rapih. Kalo gak tau bilang gak tau." }]
  },
  {
    role: "model",
    parts: [{ text: "Siap kak! Aku lan AI. Mau ngoding berapa ribu karakter juga hayuk 🔥" }]
  }
];

btn.onclick = kirim;
txt.onkeydown = e => { if(e.key==='Enter' &&!e.shiftKey){ e.preventDefault(); kirim(); }};
txt.oninput = () => { txt.style.height='auto'; txt.style.height=txt.scrollHeight+'px'; };

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  const formatted = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  div.innerHTML = formatted;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
  return div;
}

async function kirim() {
  let text = txt.value.trim();
  if(!text || btn.disabled) return;

  addMsg(text, 'user');
  history.push({ role: "user", parts: [{ text: text }] });
  txt.value = ''; txt.style.height='auto'; btn.disabled = true;

  const typing = addMsg('lan AI lagi ngetik...', 'ai');
  stat.textContent = 'Minta ke Vercel...';

  try {
    // Panggil API kita sendiri di /api/chat
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history })
    });

    const data = await res.json();
    typing.remove();

    if(data.error) throw new Error(data.error.message || data.error);
    if(!data.candidates) throw new Error('Gak ada balasan dari Gemini');

    const reply = data.candidates[0].content.parts[0].text;
    addMsg(reply, 'ai');
    history.push({ role: "model", parts: [{ text: reply }] });
    stat.textContent = 'Gemini 1.5 Flash | Vercel Environment';

    if(history.length > 20) history = history.slice(-18);

  } catch(e) {
    typing.remove();
    addMsg('Error kak: ' + e.message, 'ai');
    stat.textContent = 'Error';
  }

  btn.disabled = false; txt.focus();
}
</script>
</body>
</html>
